name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-core-cross-platform:
    name: CLI/Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Validate Swift (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          swift --version
          SWIFT_VERSION="$(swift --version | sed -nE 's/.*Swift version ([0-9]+(\.[0-9]+){0,2}).*/\1/p' | head -1)"
          if [ -z "$SWIFT_VERSION" ]; then
            echo "Unable to detect Swift version" >&2
            exit 1
          fi

          IFS=. read -r SWIFT_MAJOR SWIFT_MINOR _ <<< "$SWIFT_VERSION"
          if [ "$SWIFT_MAJOR" -lt 6 ] || { [ "$SWIFT_MAJOR" -eq 6 ] && [ "$SWIFT_MINOR" -lt 2 ]; }; then
            echo "Swift $SWIFT_VERSION is too old; requires Swift >= 6.2.0" >&2
            exit 1
          fi

      - name: Setup Swift (Windows)
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.2-release
          swift-build: 6.2-RELEASE

      - name: Run RashunCore tests
        run: swift test --filter RashunCoreTests

      - name: Run RashunCLI tests
        run: swift test --filter RashunCLITests

      - name: Build CLI
        run: swift build --product RashunCLI

      - name: CLI smoke test (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          swift run RashunCLI --help
          swift run RashunCLI

      - name: CLI smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          swift run RashunCLI --help
          swift run RashunCLI

  macos-app:
    name: macOS App
    runs-on: macos-latest
    needs: cli-core-cross-platform

    steps:
      - uses: actions/checkout@v4

      - name: Validate Swift
        shell: bash
        run: |
          set -euo pipefail
          swift --version
          SWIFT_VERSION="$(swift --version | sed -nE 's/.*Swift version ([0-9]+(\.[0-9]+){0,2}).*/\1/p' | head -1)"
          if [ -z "$SWIFT_VERSION" ]; then
            echo "Unable to detect Swift version" >&2
            exit 1
          fi

          IFS=. read -r SWIFT_MAJOR SWIFT_MINOR _ <<< "$SWIFT_VERSION"
          if [ "$SWIFT_MAJOR" -lt 6 ] || { [ "$SWIFT_MAJOR" -eq 6 ] && [ "$SWIFT_MINOR" -lt 2 ]; }; then
            echo "Swift $SWIFT_VERSION is too old; requires Swift >= 6.2.0" >&2
            exit 1
          fi

      - name: Generate source list
        run: ./build.sh --test

      - name: Run tests
        run: swift test

      - name: Build app bundle
        run: ./build.sh

      - name: Smoke test app launch
        shell: bash
        run: |
          set -euo pipefail

          BEFORE_LIST="$(mktemp)"
          AFTER_LIST="$(mktemp)"
          ls -1 ~/Library/Logs/DiagnosticReports/Rashun-*.ips 2>/dev/null | sort > "$BEFORE_LIST" || true

          ./Rashun.app/Contents/MacOS/Rashun >/tmp/rashun-smoke.stdout 2>/tmp/rashun-smoke.stderr &
          APP_PID=$!

          sleep 6

          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "Rashun exited during smoke test."
            echo "--- stdout ---"
            cat /tmp/rashun-smoke.stdout || true
            echo "--- stderr ---"
            cat /tmp/rashun-smoke.stderr || true

            ls -1 ~/Library/Logs/DiagnosticReports/Rashun-*.ips 2>/dev/null | sort > "$AFTER_LIST" || true
            NEW_REPORTS="$(comm -13 "$BEFORE_LIST" "$AFTER_LIST" || true)"
            if [ -n "$NEW_REPORTS" ]; then
              echo "--- New Rashun crash report(s) ---"
              echo "$NEW_REPORTS"
              LATEST_REPORT="$(echo "$NEW_REPORTS" | tail -1)"
              sed -n '1,220p' "$LATEST_REPORT" || true
            fi

            exit 1
          fi

          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true
